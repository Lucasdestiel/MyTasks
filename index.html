<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header>
    <h1>📋 TaskFlow</h1>
    <p>Organize suas tarefas com facilidade</p>
  </header>

  <div class="input-group">
    <input
      type="text"
      id="taskInput"
      placeholder="Digite uma tarefa..."
    >
    <button id="addBtn">Adicionar</button>
  </div>

  <div class="stats">

    <div class="stat-card">
      <span id="totalTasks">0</span>
      <small>Total</small>
    </div>

    <div class="stat-card">
      <span id="completedTasks">0</span>
      <small>Concluídas</small>
    </div>

    <div class="stat-card">
      <span id="pendingTasks">0</span>
      <small>Pendentes</small>
    </div>

  </div>

  <div class="progress-container">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <div class="filters">
    <button class="filter active" data-filter="all">Todas</button>
    <button class="filter" data-filter="pending">Pendentes</button>
    <button class="filter" data-filter="completed">Concluídas</button>
  </div>

  <div id="tasksContainer" class="tasks-container"></div>

  <div class="actions">
    <button id="clearCompleted">
      Limpar concluídas
    </button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
